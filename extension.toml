id = "n8n-as-code"
name = "n8n as code"
version = "0.1.0"
schema_version = 1
authors = ["Khairul"]
description = "Native Zed extension for n8n-as-code workflows, slash commands, and MCP bridge."
repository = "https://github.com/khmuhtadin/zed-n8n-as-code"

[slash_commands.n8n-list]
description = "List n8n workflows through n8nac"
requires_argument = false

[slash_commands.n8n-pull]
description = "Pull a workflow by n8n workflow id"
requires_argument = true

[slash_commands.n8n-push]
description = "Push a local .workflow.ts filename through n8nac"
requires_argument = true

[slash_commands.n8n-verify]
description = "Verify a workflow by id"
requires_argument = true

[slash_commands.n8n-validate]
description = "Validate a local .workflow.ts file"
requires_argument = true

[slash_commands.n8n-browse]
description = "Browse n8n workflows with native rich output"
requires_argument = false

[slash_commands.n8n-status]
description = "Show local/remote workflow diff status"
requires_argument = false

[slash_commands.n8n-config]
description = "Show extension configuration and settings"
requires_argument = false

[context_servers.n8nac]
